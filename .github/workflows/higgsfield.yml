name: Higgsfield Generate

on:
  workflow_dispatch:
    inputs:
      media_id:
        description: "chs_media UUID to update after generation"
        required: true
      prompt:
        description: "Generation prompt"
        required: true
      type:
        description: "Media type: photo or video"
        required: true
      soul_id:
        description: "Higgsfield Soul ID (required for photo)"
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Install Higgsfield CLI
        run: npm install -g @higgsfield/cli

      - name: Authenticate
        run: |
          if higgsfield auth login --help 2>&1 | grep -q -- '--token'; then
            higgsfield auth login --token "${{ secrets.HIGGSFIELD_TOKEN }}"
          else
            HIGGSFIELD_TOKEN="${{ secrets.HIGGSFIELD_TOKEN }}" higgsfield auth login
          fi

      - name: Generate media
        id: generate
        run: |
          set -e
          # NOTE: CLI job_set_type uses the catalog id `soul_2` (the MCP/internal name
          # text2image_soul_v2 is NOT accepted by the CLI). Soul ref is the `soul_id` param.
          if [ "${{ inputs.type }}" = "photo" ]; then
            RESULT=$(higgsfield generate create soul_2 \
              --prompt "${{ inputs.prompt }}" \
              --soul_id "${{ inputs.soul_id }}" \
              --aspect_ratio 9:16 \
              --wait --wait-timeout 10m --json)
          else
            RESULT=$(higgsfield generate create cinematic_studio_3_0 \
              --prompt "${{ inputs.prompt }}" \
              --aspect_ratio 9:16 \
              --wait --wait-timeout 20m --json)
          fi
          echo "$RESULT" > result.json
          echo "--- higgsfield raw result ---"
          cat result.json

      - name: Download + upload to Supabase + mark ready
        run: |
          set -e
          # The completed-job JSON puts the image at results.rawUrl; fall back through other shapes.
          URL=$(jq -r '
            .results.rawUrl
            // .generation.results.rawUrl
            // (.. | objects | .rawUrl? // empty)
            // (.. | objects | .url? // empty)
            // .result_url
            // empty' result.json | head -1)
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "No result URL found in CLI output"; exit 1
          fi
          echo "Downloading $URL"
          curl -sSL "$URL" -o out.bin
          # Pick extension/content-type from the type (photo=png, video=mp4)
          if [ "${{ inputs.type }}" = "photo" ]; then EXT=png; CT=image/png; FOLDER=media; else EXT=mp4; CT=video/mp4; FOLDER=videos; fi
          OBJ="$FOLDER/${{ inputs.media_id }}.$EXT"
          # Upload to Supabase Storage (upsert) so the asset lives on our CDN like everything else.
          curl -sS -X POST "${{ secrets.SUPABASE_URL }}/storage/v1/object/character-media/$OBJ" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "x-upsert: true" \
            -H "Content-Type: $CT" \
            --data-binary @out.bin
          PUB="${{ secrets.SUPABASE_URL }}/storage/v1/object/public/character-media/$OBJ?t=$(date +%s)"
          curl -sS -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/chs_media?id=eq.${{ inputs.media_id }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"media_url\": \"${PUB}\", \"source_url\": \"${PUB}\", \"generation_status\": \"completed\", \"status\": \"ready\", \"last_error\": null}"

      - name: Mark failed on error
        if: failure()
        run: |
          curl -sS -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/chs_media?id=eq.${{ inputs.media_id }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"generation_status": "failed", "status": "failed", "last_error": "higgsfield workflow failed — see GitHub Actions logs"}'
